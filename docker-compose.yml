services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - '${PORT}:${PORT}'
    env_file:
      - .env
    environment:
      - DB_HOST=db
    volumes:
      - ./src:/app/src
    depends_on:
      - db
    command: npm run dev

volumes:
  postgres_data:
